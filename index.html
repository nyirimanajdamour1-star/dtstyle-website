<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&amp;T Style — Tailoring &amp; Goods, Vientiane</title>
<style>
  :root{
    --ink:#111111;
    --ink-soft:#6E6B6C;
    --canvas:#FFFFFF;
    --canvas-soft:#F5F5F4;
    --line:#E3E1DF;
    --good:#1B7A3C;
    --good-bg:#E9F5EC;
    --warn:#8a5a06;
    --warn-bg:#FBF0DC;
    --font-display:'Playfair Display', Georgia, serif;
    --font-body:'IBM Plex Sans', -apple-system, sans-serif;
    --font-label:'IBM Plex Mono', monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--canvas); color:var(--ink); font-family:var(--font-body); -webkit-font-smoothing:antialiased; }
  a{ color:inherit; }
  img{ max-width:100%; display:block; }
  button{ font-family:inherit; }
  ::selection{ background:var(--ink); color:#fff; }

  .stitch{ height:1px; width:100%; background-image:repeating-linear-gradient(90deg, var(--ink) 0 8px, transparent 8px 16px); opacity:.5; }
  .stitch.thick{ height:2px; }

  header.site{ position:sticky; top:0; z-index:15; background:var(--ink); color:#fff; }
  .nav-wrap{ max-width:1180px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:16px 28px; gap:16px; }
  .logo{ display:flex; flex-direction:column; cursor:pointer; }
  .logo .mono{ font-family:var(--font-display); font-size:26px; font-weight:700; letter-spacing:1px; line-height:1; }
  .logo .sub{ font-family:var(--font-label); font-size:10px; letter-spacing:.35em; color:#B9B6B2; margin-top:2px; }
  nav.main-links{ display:flex; gap:4px; flex-wrap:wrap; }
  nav.main-links button{
    background:none; border:none; color:#fff; font-family:var(--font-body); font-size:13.5px; letter-spacing:.02em;
    padding:10px 14px; cursor:pointer; position:relative; opacity:.75;
  }
  nav.main-links button.active{ opacity:1; }
  nav.main-links button.active::after{ content:''; position:absolute; left:14px; right:14px; bottom:4px; height:2px; background:#fff; }
  nav.main-links button:hover{ opacity:1; }
  .nav-actions{ display:flex; align-items:center; gap:10px; }
  .cart-btn{ position:relative; background:#fff; color:var(--ink); border:none; border-radius:50%; width:42px; height:42px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .cart-btn:hover{ background:#e7e7e7; }
  .cart-btn .count{ position:absolute; top:-6px; right:-6px; background:var(--ink); color:#fff; border-radius:50%; width:19px; height:19px; font-size:10.5px; display:flex; align-items:center; justify-content:center; font-family:var(--font-label); }
  .menu-toggle{ display:none; background:none; border:none; color:#fff; font-size:22px; cursor:pointer; }

  main{ max-width:1180px; margin:0 auto; padding:0 28px 90px; }

  .hero{ background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.035) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(45deg, rgba(255,255,255,.035) 0 2px, transparent 2px 26px),
      radial-gradient(ellipse at 30% 0%, #2a2a2a, #0a0a0a 60%);
    color:#fff; margin:0 -28px 0; padding:100px 28px 84px; text-align:center; position:relative; overflow:hidden; }
  .hero::before{ content:''; position:absolute; inset:0; background:radial-gradient(circle at 20% 20%, rgba(255,255,255,.06), transparent 45%), radial-gradient(circle at 85% 80%, rgba(255,255,255,.05), transparent 40%); pointer-events:none; }
  .hero::after{ content:'D&T'; position:absolute; right:-30px; bottom:-60px; font-family:var(--font-display); font-size:260px; font-weight:700; color:rgba(255,255,255,.03); line-height:1; pointer-events:none; z-index:1; }
  .hero-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center 30%; z-index:0; }
  .hero-overlay{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.72) 60%, rgba(0,0,0,.85)); z-index:1; }
  .hero-content{ position:relative; z-index:2; }
  .hero .eyebrow{ font-family:var(--font-label); font-size:11px; letter-spacing:.3em; color:#B9B6B2; margin-bottom:14px; position:relative; }
  .hero h1{ font-family:var(--font-display); font-size:48px; margin:0 0 14px; font-weight:700; max-width:640px; margin-left:auto; margin-right:auto; position:relative; }
  .hero p{ color:#C9C6C2; max-width:480px; margin:0 auto 28px; font-size:15.5px; position:relative; }
  .hero-btn{ background:#fff; color:var(--ink); border:none; padding:14px 32px; border-radius:2px; font-weight:700; font-size:13px; letter-spacing:.05em; cursor:pointer; position:relative; transition:.15s; }
  .hero-btn:hover{ background:#e7e7e7; transform:translateY(-1px); }
  .hero-cats{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:22px; position:relative; }
  .hero-cats button{ background:none; border:1px solid rgba(255,255,255,.3); color:#fff; padding:7px 16px; border-radius:100px; font-size:12.5px; cursor:pointer; transition:.15s; }
  .hero-cats button:hover{ border-color:#fff; background:rgba(255,255,255,.08); }

  .tiles{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin:44px 0; }
  .tile{ background:#fff; border:1px solid var(--line); padding:30px 18px; text-align:center; cursor:pointer; transition:.18s; }
  .tile:hover{ border-color:var(--ink); transform:translateY(-3px); box-shadow:0 10px 24px rgba(0,0,0,.08); }
  .icon-circle{ width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; transition:.18s; }
  .tile:hover .icon-circle{ transform:scale(1.08); }
  .tile h4{ font-family:var(--font-display); margin:0 0 6px; font-size:17px; }
  .tile p{ margin:0; font-size:12.5px; color:var(--ink-soft); line-height:1.5; }

  section{ margin:64px 0; }
  .section-head{ text-align:center; margin-bottom:34px; }
  .section-head .eyebrow{ font-family:var(--font-label); font-size:11px; letter-spacing:.3em; color:var(--ink-soft); margin-bottom:8px; }
  .section-head h2{ font-family:var(--font-display); font-size:32px; margin:0; }
  .section-head p.sub{ color:var(--ink-soft); font-size:14px; max-width:460px; margin:10px auto 0; }

  .filter-row{ display:flex; gap:8px; justify-content:center; margin-bottom:30px; flex-wrap:wrap; }
  .filter-row button{ background:#fff; border:1px solid var(--line); padding:7px 16px; border-radius:100px; font-size:12.5px; cursor:pointer; transition:.15s; }
  .filter-row button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .filter-row button:hover:not(.active){ border-color:var(--ink); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:22px; }
  .card{ background:#fff; border:1px solid var(--line); display:flex; flex-direction:column; transition:.15s; }
  .card:hover{ box-shadow:0 10px 24px rgba(0,0,0,.07); transform:translateY(-2px); }
  .thumb{ height:190px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:38px; color:#fff; font-weight:700; background:linear-gradient(135deg,#2b2b2b,#111111); background-size:cover; background-position:center; }
  .card .body{ padding:16px 18px 18px; display:flex; flex-direction:column; gap:7px; flex:1; }
  .card .cat{ font-family:var(--font-label); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); }
  .card .name{ font-weight:600; font-size:15px; }
  .card .desc{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; }
  .card .price{ font-family:var(--font-label); font-size:16px; margin-top:auto; }
  .card button.add{ background:var(--ink); color:#fff; border:none; padding:10px; font-size:13px; cursor:pointer; margin-top:4px; transition:.15s; }
  .card button.add:hover{ background:#333; }
  .card button.add:disabled{ opacity:.4; cursor:not-allowed; }
  .empty{ grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--ink-soft); font-family:var(--font-label); font-size:13px; }
  .stock-tag{ font-family:var(--font-label); font-size:10.5px; color:var(--warn); }

  .service-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:24px; }
  .service{ display:flex; gap:16px; background:#fff; border:1px solid var(--line); padding:24px; }
  .service .num{ font-family:var(--font-display); font-size:28px; color:var(--ink-soft); flex-shrink:0; }
  .service h4{ margin:0 0 6px; font-family:var(--font-display); font-size:18px; }
  .service p{ margin:0; font-size:13.5px; color:var(--ink-soft); }

  .gallery-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .g-tile{ aspect-ratio:3/4; display:flex; align-items:flex-end; padding:14px; font-family:var(--font-display); color:#fff; font-size:15px; transition:.2s; }
  .g-tile:hover{ transform:scale(1.02); }

  .about-split{ display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; }
  .about-split .art{ background:var(--ink); aspect-ratio:4/5; display:flex; align-items:center; justify-content:center; color:#C9C6C2; font-family:var(--font-display); font-size:20px; text-align:center; padding:20px; }
  .about-split h3{ font-family:var(--font-display); font-size:26px; margin-top:0; }
  .about-split p{ color:var(--ink-soft); font-size:14.5px; line-height:1.7; }
  .about-stats{ display:flex; gap:28px; margin-top:20px; }
  .about-stats div{ text-align:left; }
  .about-stats .n{ font-family:var(--font-display); font-size:26px; color:var(--ink); }
  .about-stats .l{ font-family:var(--font-label); font-size:10.5px; color:var(--ink-soft); letter-spacing:.05em; }

  .contact-grid{ display:grid; grid-template-columns:1fr 1fr; gap:40px; }
  .contact-info div{ margin-bottom:18px; }
  .contact-info .label{ font-family:var(--font-label); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); margin-bottom:4px; }
  input, textarea, select{ width:100%; padding:11px 13px; border:1px solid var(--line); font-family:var(--font-body); font-size:14px; margin-bottom:12px; background:#fff; border-radius:2px; }
  input:focus, textarea:focus, select:focus{ outline:2px solid var(--ink); outline-offset:1px; border-color:var(--ink); }
  label.f{ font-size:12px; color:var(--ink-soft); font-weight:600; display:block; margin-bottom:4px; }
  .primary-btn{ background:var(--ink); color:#fff; border:none; padding:13px 24px; font-weight:700; font-size:13px; cursor:pointer; border-radius:2px; transition:.15s; }
  .primary-btn:hover{ background:#333; }
  .primary-btn:disabled{ opacity:.4; cursor:not-allowed; }
  .ghost-btn{ background:none; border:1px solid var(--line); padding:10px 18px; font-size:12.5px; cursor:pointer; border-radius:2px; color:var(--ink); }
  .ghost-btn:hover{ border-color:var(--ink); }

  footer.site{ background:var(--ink); color:#B9B6B2; text-align:center; padding:36px 20px; font-size:12px; margin-top:60px; }
  footer.site .foot-links{ display:flex; gap:20px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  footer.site .foot-links button{ background:none; border:none; color:#B9B6B2; font-size:12.5px; cursor:pointer; opacity:.85; }
  footer.site .foot-links button:hover{ opacity:1; text-decoration:underline; }
  footer.site button.admin-link{ background:none; border:none; color:#B9B6B2; opacity:.7; font-size:11px; cursor:pointer; text-decoration:underline; margin-top:8px; }

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; z-index:30; }
  .overlay.show{ display:block; }
  .drawer{ position:fixed; top:0; right:0; height:100%; width:400px; max-width:92vw; background:#fff; box-shadow:-8px 0 30px rgba(0,0,0,.18); z-index:31; transform:translateX(100%); transition:.25s; display:flex; flex-direction:column; }
  .drawer.show{ transform:translateX(0); }
  .drawer-head{ padding:20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .drawer-head h3{ font-family:var(--font-display); margin:0; font-size:20px; }
  .drawer-head button{ background:none; border:none; font-size:20px; cursor:pointer; }
  .drawer-body{ flex:1; overflow-y:auto; padding:16px 20px; }
  .line-item{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed var(--line); font-size:14px; }
  .line-item .qty{ display:flex; align-items:center; gap:8px; font-family:var(--font-label); }
  .line-item .qty button{ width:22px; height:22px; border-radius:50%; border:1px solid var(--line); background:#fff; cursor:pointer; }
  .drawer-foot{ padding:20px; border-top:1px solid var(--line); }
  .total-row{ display:flex; justify-content:space-between; font-family:var(--font-label); font-size:17px; margin-bottom:14px; }
  .bank-box{ background:var(--canvas-soft); border:1px solid var(--line); padding:14px; font-size:12.5px; margin-top:8px; }
  .bank-box .row{ display:flex; justify-content:space-between; padding:3px 0; }
  .pay-tabs{ display:flex; gap:6px; margin-bottom:4px; }
  .pay-tabs button{ flex:1; background:#fff; border:1px solid var(--line); padding:8px 6px; border-radius:4px; font-size:12px; cursor:pointer; transition:.15s; }
  .pay-tabs button.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .qr-wrap{ display:flex; justify-content:center; padding:12px 0; background:#fff; }
  .wallet-address{ font-family:var(--font-label); font-size:11px; background:#fff; border:1px solid var(--line); padding:8px; border-radius:4px; margin-top:8px; word-break:break-all; text-align:center; }
  .small-muted{ color:var(--ink-soft); font-size:12px; }

  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 22px; border-radius:4px; font-size:13px; z-index:50; opacity:0; pointer-events:none; transition:.25s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  /* ---------- Admin dashboard ---------- */
  .admin-gate{ max-width:340px; margin:80px auto; text-align:center; background:#fff; border:1px solid var(--line); padding:36px 28px; }
  .admin-gate h2{ font-family:var(--font-display); margin-top:0; }

  .admin-shell{ display:grid; grid-template-columns:220px 1fr; gap:0; margin:32px -28px 0; min-height:640px; border-top:1px solid var(--line); }
  .admin-sidebar{ background:var(--ink); color:#fff; padding:28px 0; }
  .admin-sidebar .brand{ font-family:var(--font-display); font-size:19px; padding:0 22px 20px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:14px; }
  .admin-sidebar button{ display:block; width:100%; text-align:left; background:none; border:none; color:#C9C6C2; padding:12px 22px; font-size:13.5px; cursor:pointer; position:relative; }
  .admin-sidebar button.active{ color:#fff; background:rgba(255,255,255,.08); }
  .admin-sidebar button.active::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#fff; }
  .admin-sidebar button:hover{ color:#fff; }
  .admin-sidebar .exit{ margin-top:24px; padding-top:14px; border-top:1px solid rgba(255,255,255,.12); }

  .admin-main{ padding:32px 36px; background:var(--canvas-soft); }
  .admin-topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; }
  .admin-topbar h2{ font-family:var(--font-display); margin:0; font-size:24px; }

  .stat-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat-card{ background:#fff; border:1px solid var(--line); padding:18px 20px; }
  .stat-card .l{ font-family:var(--font-label); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:8px; }
  .stat-card .v{ font-family:var(--font-display); font-size:26px; }
  .stat-card .v.warn{ color:var(--warn); }

  .panel{ background:#fff; border:1px solid var(--line); padding:22px 24px; margin-bottom:22px; }
  .panel-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .panel h3{ font-family:var(--font-display); margin:0; font-size:18px; }
  .form-row{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-family:var(--font-label); font-size:10.5px; text-transform:uppercase; color:var(--ink-soft); padding:8px 6px; border-bottom:1px solid var(--line); }
  td{ padding:10px 6px; border-bottom:1px solid var(--line); vertical-align:middle; }
  .price-edit{ width:110px; margin:0; padding:6px 8px; font-size:13px; }
  .tag-pill{ background:var(--canvas-soft); border:1px solid var(--line); padding:2px 8px; border-radius:100px; font-size:11px; }
  .del-btn{ background:none; border:1px solid var(--line); color:var(--warn); padding:5px 10px; font-size:11.5px; cursor:pointer; border-radius:2px; }
  .status-pill{ padding:3px 9px; border-radius:100px; font-family:var(--font-label); font-size:10.5px; text-transform:uppercase; }
  .status-pending{ background:var(--warn-bg); color:var(--warn); }
  .status-paid{ background:var(--good-bg); color:var(--good); }

  .prod-thumb-cell{ display:flex; align-items:center; gap:10px; }
  .prod-thumb-mini{ width:44px; height:44px; border-radius:4px; background:var(--ink); background-size:cover; background-position:center; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-label); font-size:11px; }
  .img-upload-box{ border:1.5px dashed var(--line); border-radius:4px; padding:16px; text-align:center; cursor:pointer; background:var(--canvas-soft); transition:.15s; }
  .camera-icon{ display:flex; justify-content:center; margin-bottom:4px; }
  .img-upload-box:hover{ border-color:var(--ink); }
  .img-upload-box img{ max-height:90px; margin:0 auto 6px; border-radius:4px; }
  .img-upload-box .hint{ font-size:11.5px; color:var(--ink-soft); }
  .img-upload-box input[type=file]{ display:none; }
  .change-photo-btn{ font-size:11px; background:none; border:1px solid var(--line); border-radius:100px; padding:3px 10px; cursor:pointer; margin-top:2px; }

  @media (max-width: 860px){
    nav.main-links{ display:none; }
    .menu-toggle{ display:block; }
    nav.main-links.mobile-open{ display:flex; position:absolute; top:100%; left:0; right:0; background:var(--ink); flex-direction:column; padding:8px 0; }
    .tiles, .service-grid, .about-split, .contact-grid, .gallery-grid{ grid-template-columns:1fr; }
    .hero h1{ font-size:34px; }
    .form-row, .stat-row{ grid-template-columns:1fr 1fr; }
    .admin-shell{ grid-template-columns:1fr; }
    .admin-sidebar{ display:flex; overflow-x:auto; padding:12px; }
    .admin-sidebar .brand{ display:none; }
    .admin-sidebar button{ white-space:nowrap; width:auto; }
    .admin-main{ padding:20px; }
  }
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
let paymentSettings = {
  bankName:'BCEL', bankAccount:'010-12-00-12345-6', bankAccountName:'D&T Style Co.', bankQrImage:null,
  cryptoAsset:'USDT', cryptoNetwork:'TRC20', cryptoAddress:'TXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX-REPLACE-ME'
};
let settingsDraft = { ...paymentSettings };
function resetSettingsDraft(){ settingsDraft = { ...paymentSettings }; }
function updateSettingsField(key, val){ settingsDraft[key] = val; }
const CATS = {
  clothes: { label:'Clothes' },
  shoes:   { label:'Shoes' },
  belts:   { label:'Belts' },
  cups:    { label:'Cups' },

function addToCart(id){
  const p = products.find(p=>p.id===id); if(!p) return;
  const inCart = cart[id]||0;
  if(p.stock !== undefined && inCart >= p.stock){ showToast('No more in stock'); return; }
  cart[id] = inCart + 1;
  showToast(`${p.name} added to cart`);
  render();
}
function changeQty(id, delta){
  const next = (cart[id]||0) + delta;
  if(next <= 0){ delete cart[id]; } else { cart[id] = next; }
  render();
}

      }

async function placeOrder(){
  const name = (checkoutDraft.name||'').trim();
  const phone = (checkoutDraft.phone||'').trim();
  const note = (checkoutDraft.note||'').trim();
  const method = checkoutDraft.method || 'bank';
  if(!name || !phone){ showToast('Please add your name and phone'); return; }
  const items = Object.entries(cart).map(([id,qty])=>{ const p=products.find(p=>p.id===id); return {id, name:p.name, qty, price:p.price}; });
  const total = cartTotal();
  try{
    const { error: orderError } = await sb.from('orders').insert({
      customer_name: name, phone, note, items, total, payment_method: method, status:'pending'
    });
    if(orderError) throw orderError;

    for(const line of items){
      const p = products.find(p=>p.id===line.id);
      if(p && p.stock !== undefined){
        const newStock = Math.max(0, p.stock - line.qty);
        await sb.from('products').update({ stock:newStock }).eq('id', p.id);
        p.stock = newStock;
      }
    }
    if(session) await reloadPrivateData();
    cart = {}; cartOpen = false;
    resetCheckoutDraft();
    showToast("Order placed! We'll confirm once payment is received.");
  }catch(e){ showToast('Could not place order — try again'); }
  render();
}

  const revenue = orders.filter(o=>o.status==='paid').reduce((s,o)=>s+o.total,0);
  const pendingCount = orders.filter(o=>o.status==='pending').length;
  const lowStock = products.filter(p=>p.stock!==undefined && p.stock<=5).length;

  const tabs = [['overview','Overview'],['products','Products'],['orders','Orders'],['messages','Messages'],['settings','Payment Settings']];

  let content = '';
  if(adminTab === 'overview') content = renderAdminOverview(revenue, pendingCount, lowStock);
  else if(adminTab === 'products') content = renderAdminProducts();
  else if(adminTab === 'orders') content = renderAdminOrders();
  else if(adminTab === 'messages') content = renderAdminMessages();
  else if(adminTab === 'settings') content = renderAdminSettings();

  return `
    <div class="admin-shell">
      <div class="admin-sidebar">
        <div class="brand">D&amp;T Style<br><span style="font-size:11px;font-family:var(--font-label);color:#B9B6B2;">OWNER DASHBOARD</span></div>
        ${tabs.map(([k,l])=>`<button class="${adminTab===k?'active':''}" onclick="setAdminTab('${k}')">${l}</button>`).join('')}
        <div class="exit"><button onclick="logout()">Log out</button><button onclick="goTo('home')">← Back to store</button></div>
      </div>
      <div class="admin-main">
        <div class="admin-topbar">
          <h2>${tabs.find(t=>t[0]===adminTab)[1]}</h2>
        </div>
        <div class="stat-row">
          <div class="stat-card"><div class="l">Revenue collected</div><div class="v">${fmtKip(revenue)}</div></div>
          <div class="stat-card"><div class="l">Pending orders</div><div class="v ${pendingCount>0?'warn':''}">${pendingCount}</div></div>
          <div class="stat-card"><div class="l">Low stock items</div><div class="v ${lowStock>0?'warn':''}">${lowStock}</div></div>
          <div class="stat-card"><div class="l">New messages</div><div class="v">${inquiries.length}</div></div>
        </div>
        ${content}
      </div>
    </div>`;
}

function renderAdminOverview(revenue, pendingCount, lowStock){
  const recentOrders = orders.slice(0,5);
  return `
    <div class="panel">
      <div class="panel-head"><h3>Recent orders</h3><button class="ghost-btn" onclick="setAdminTab('orders')">View all</button></div>
      <table><thead><tr><th>Customer</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>${recentOrders.map(o=>`
        <tr>
          <td>${escapeHtml(o.customer)}</td>
          <td>${o.items.map(i=>`${i.qty}× ${escapeHtml(i.name)}`).join(', ')}</td>
          <td style="font-family:var(--font-label)">${fmtKip(o.total)}</td>
          <td><span class="status-pill status-${o.status}">${o.status}</span></td>
        </tr>`).join('') || '<tr><td colspan="4" class="small-muted">No orders yet.</td></tr>'}</tbody></table>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Products running low</h3><button class="ghost-btn" onclick="setAdminTab('products')">Manage products</button></div>
      <table><thead><tr><th>Product</th><th>Stock left</th></tr></thead>
      <tbody>${products.filter(p=>p.stock!==undefined && p.stock<=5).map(p=>`
        <tr><td>${escapeHtml(p.name)}</td><td class="small-muted">${p.stock} left</td></tr>`).join('') || '<tr><td colspan="2" class="small-muted">All stocked up.</td></tr>'}</tbody></table>
    </div>`;
}

function productImageInputHtml(){
  const previewHtml = newDraft.image
    ? `<img src="${newDraft.image}" /><div class="hint">Photo ready — click to change</div>`
    : `<div class="camera-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6E6B6C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.5"/></svg></div><div class="hint">Click to upload a product photo</div>`;
  return `
    <label class="img-upload-box" for="new-image-input">
      ${previewHtml}
      <input type="file" id="new-image-input" accept="image/*" onchange="handleNewImageSelect(event)" />
    </label>`;
}

async function handleNewImageSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 1.5*1024*1024){ showToast('Please use an image under 1.5MB'); return; }
  const reader = new FileReader();
  reader.onload = () => { newDraft.image = reader.result; render(); };
  reader.onerror = () => showToast('Could not read that image');
  reader.readAsDataURL(file);
}

async function handleExistingImageSelect(event, id){
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 1.5*1024*1024){ showToast('Please use an image under 1.5MB'); return; }
  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const { error } = await sb.from('products').update({ image:reader.result }).eq('id', id);
      if(error) throw error;
      products = products.map(p=> p.id===id ? {...p, image:reader.result} : p);
      showToast('Photo updated');
    }catch(e){ showToast('Could not save photo — try again'); }
    render();
  };
  reader.onerror = () => showToast('Could not read that image');
  reader.readAsDataURL(file);
}

function renderAdminProducts(){
  const rows = products.map(p=>{
    const initials = p.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const thumbStyle = p.image ? `background-image:url('${p.image}')` : '';
    return `
    <tr>
      <td>
        <div class="prod-thumb-cell">
          <div class="prod-thumb-mini" style="${thumbStyle}">${p.image ? '' : initials}</div>
          <div>
            ${escapeHtml(p.name)}
            <div><label class="change-photo-btn">Change photo<input type="file" accept="image/*" style="display:none" onchange="handleExistingImageSelect(event,'${p.id}')"></label></div>
          </div>
        </div>
      </td>
      <td><span class="tag-pill">${CATS[p.cat]?.label||p.cat}</span></td>
      <td><input class="price-edit" type="number" value="${p.price}" onchange="updatePrice('${p.id}', this.value)" /></td>
      <td><input class="price-edit" style="width:70px" type="number" value="${p.stock ?? 0}" onchange="updateStock('${p.id}', this.value)" /></td>
      <td><button class="del-btn" onclick="deleteProduct('${p.id}')">Remove</button></td>
    </tr>`;
  }).join('');
  return `
    <div class="panel">
      <h3 style="margin-bottom:14px;">Add a product</h3>
      <div class="form-row">
        <div><label class="f">Name</label><input id="new-name" placeholder="e.g. Woven scarf" value="${escapeHtml(newDraft.name)}" oninput="updateDraftField('name', this.value)" /></div>
        <div><label class="f">Category</label>
          <select id="new-cat" onchange="updateDraftField('cat', this.value)">
            ${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${(newDraft.cat||Object.keys(CATS)[0])===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div><label class="f">Price (₭)</label><input id="new-price" type="number" placeholder="50000" value="${escapeHtml(newDraft.price)}" oninput="updateDraftField('price', this.value)" /></div>
      </div>
      <div class="form-row" style="margin-top:8px;">
        <div><label class="f">Description</label><input id="new-desc" placeholder="Short description" value="${escapeHtml(newDraft.desc)}" oninput="updateDraftField('desc', this.value)" /></div>
        <div><label class="f">Stock</label><input id="new-stock" type="number" placeholder="10" value="${escapeHtml(newDraft.stock)}" oninput="updateDraftField('stock', this.value)" /></div>
        <div><label class="f">Photo</label>${productImageInputHtml()}</div>
      </div>
      <button class="primary-btn" style="margin-top:14px;" onclick="addProduct()">Add product</button>
    </div>
    <div class="panel">
      <h3 style="margin-bottom:14px;">Products (${products.length})</h3>
      <table><thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" class="small-muted">No products yet.</td></tr>'}</tbody></table>
    </div>`;
}

function renderAdminOrders(){
  const payLabel = { bank:'Bank QR', crypto:'Crypto', cod:'Cash on delivery' };
  const orderRows = orders.map(o=>`
    <tr>
      <td>${escapeHtml(o.customer)}<div class="small-muted">${escapeHtml(o.phone)}</div></td>
      <td>${o.items.map(i=>`${i.qty}× ${escapeHtml(i.name)}`).join(', ')}</td>
      <td style="font-family:var(--font-label)">${fmtKip(o.total)}</td>
      <td><span class="tag-pill">${payLabel[o.paymentMethod] || 'Bank QR'}</span></td>
      <td><span class="status-pill status-${o.status}">${o.status}</span></td>
      <td>${o.status==='pending' ? `<button class="del-btn" style="border-color:var(--good);color:var(--good)" onclick="markPaid('${o.id}')">Mark paid</button>` : ''}</td>
    </tr>`).join('');
  return `
    <div class="panel">
      <h3 style="margin-bottom:14px;">All orders (${orders.length})</h3>
      <table><thead><tr><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th></th></tr></thead>
      <tbody>${orderRows || '<tr><td colspan="6" class="small-muted">No orders yet.</td></tr>'}</tbody></table>
    </div>`;
}

function renderAdminMessages(){
  const inqRows = inquiries.map(i=>`
    <tr><td>${escapeHtml(i.name)}</td><td>${escapeHtml(i.contact||'—')}</td><td>${escapeHtml(i.msg)}</td></tr>`).join('');
  return `
    <div class="panel">
      <h3 style="margin-bottom:14px;">Contact messages (${inquiries.length})</h3>
      <table><thead><tr><th>Name</th><th>Contact</th><th>Message</th></tr></thead>
      <tbody>${inqRows || '<tr><td colspan="3" class="small-muted">No messages yet.</td></tr>'}</tbody></table>
    </div>`;
}

function renderAdminSettings(){
  const qrPreview = settingsDraft.bankQrImage
    ? `<img src="${settingsDraft.bankQrImage}" /><div class="hint">Official QR uploaded — click to replace</div>`
    : `<div class="camera-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6E6B6C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.5"/></svg></div><div class="hint">Upload your bank's official scan-to-pay QR code (optional)</div>`;
  return `
    <div class="panel">
      <h3 style="margin-bottom:14px;">Bank transfer details</h3>
      <div class="form-row">
        <div><label class="f">Bank name</label><input value="${escapeHtml(settingsDraft.bankName)}" oninput="updateSettingsField('bankName', this.value)" /></div>
        <div><label class="f">Account number</label><input value="${escapeHtml(settingsDraft.bankAccount)}" oninput="updateSettingsField('bankAccount', this.value)" /></div>
        <div><label class="f">Account holder name</label><input value="${escapeHtml(settingsDraft.bankAccountName)}" oninput="updateSettingsField('bankAccountName', this.value)" /></div>
      </div>
      <label class="f" style="margin-top:6px;">Official bank QR code</label>
      <label class="img-upload-box" for="bank-qr-input" style="max-width:260px;">
        ${qrPreview}
        <input type="file" id="bank-qr-input" accept="image/*" onchange="handleQrImageSelect(event)" />
      </label>
      ${settingsDraft.bankQrImage ? `<button class="ghost-btn" style="margin-top:8px;" onclick="updateSettingsField('bankQrImage', null); render();">Remove uploaded QR</button>` : ''}
      <p class="small-muted" style="margin-top:8px;">If you upload your bank's real QR code here, customers will see that exact image at checkout instead of the generated reference code.</p>
    </div>
    <div class="panel">
      <h3 style="margin-bottom:14px;">Crypto payment details</h3>
      <div class="form-row">
        <div><label class="f">Asset</label><input value="${escapeHtml(settingsDraft.cryptoAsset)}" placeholder="e.g. USDT" oninput="updateSettingsField('cryptoAsset', this.value)" /></div>
        <div><label class="f">Network</label><input value="${escapeHtml(settingsDraft.cryptoNetwork)}" placeholder="e.g. TRC20" oninput="updateSettingsField('cryptoNetwork', this.value)" /></div>
        <div><label class="f">Wallet address</label><input value="${escapeHtml(settingsDraft.cryptoAddress)}" oninput="updateSettingsField('cryptoAddress', this.value)" /></div>
      </div>
      <p class="small-muted">A QR code encoding this address is generated automatically at checkout — no image upload needed here.</p>
    </div>
    <button class="primary-btn" onclick="savePaymentSettings()">Save payment settings</button>
  `;
}

async function handleQrImageSelect(event){
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 1.5*1024*1024){ showToast('Please use an image under 1.5MB'); return; }
  const reader = new FileReader();
  reader.onload = () => { settingsDraft.bankQrImage = reader.result; render(); };
  reader.onerror = () => showToast('Could not read that image');
  reader.readAsDataURL(file);
}

async function attemptLogin(){
  loginError = '';
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email:loginDraft.email, password:loginDraft.password });
    if(error) throw error;
    session = data.session;
    loginDraft = { email:'', password:'' };
    await reloadPrivateData();
    adminTab = 'overview';
    showToast('Logged in');
  }catch(e){ loginError = 'Login failed — check your email and password.'; }
  render();
}
async function logout(){
  try{ await sb.auth.signOut(); }catch(e){ /* ignore */ }
  session = null;
  route = 'home';
  render();
}
async function addProduct(){
  const name = (newDraft.name||'').trim();
  const cat = newDraft.cat || Object.keys(CATS)[0];
  const price = parseFloat(newDraft.price);
  const desc = (newDraft.desc||'').trim();
  const stock = parseInt(newDraft.stock) || 0;
  if(!name || !price){ showToast('Add a name and price'); return; }
  try{
    const { data, error } = await sb.from('products').insert({ name, category:cat, price, description:desc, stock, image:newDraft.image }).select();
    if(error) throw error;
    products.push({ id:data[0].id, name, cat, price, desc, stock, image:newDraft.image });
    resetDraft();
    showToast('Product added');
  }catch(e){ showToast('Could not save — try again'); }
  render();
}
async function updatePrice(id, val){
  const price = parseFloat(val); if(!price) return;
  try{
    const { error } = await sb.from('products').update({ price }).eq('id', id);
    if(error) throw error;
    products = products.map(p=> p.id===id ? {...p, price} : p);
    showToast('Price updated');
  }catch(e){ showToast('Could not save — try again'); }
}
async function updateStock(id, val){
  const stock = parseInt(val); if(isNaN(stock)) return;
  try{
    const { error } = await sb.from('products').update({ stock }).eq('id', id);
    if(error) throw error;
    products = products.map(p=> p.id===id ? {...p, stock} : p);
    showToast('Stock updated');
  }catch(e){ showToast('Could not save — try again'); }
}
async function deleteProduct(id){
  try{
    const { error } = await sb.from('products').delete().eq('id', id);
    if(error) throw error;
    products = products.filter(p=>p.id!==id);
  }catch(e){ showToast('Could not remove — try again'); }
  render();
}
async function markPaid(id){
  try{
    const { error } = await sb.from('orders').update({ status:'paid' }).eq('id', id);
    if(error) throw error;
    orders = orders.map(o=> o.id===id ? {...o, status:'paid'} : o);
  }catch(e){ showToast('Could not update — try again'); }
  render();
}

function render(){
  const app = document.getElementById('app');
  if(!dataReady){
    app.innerHTML = `<div style="text-align:center;padding:120px 20px;color:var(--ink-soft);font-family:var(--font-label);">Loading D&amp;T Style…</div>`;
    return;
  }
  let body = '';
  if(route==='home') body = renderHome();
  else if(route==='shop') body = renderShop();
  else if(route==='services') body = renderServices();
  else if(route==='gallery') body = renderGallery();
  else if(route==='about') body = renderAbout();
  else if(route==='contact') body = renderContact();
  else if(route==='admin') body = renderAdmin();

  app.innerHTML = `
    ${renderNav()}
    <main>${body}</main>
    <footer class="site">
      <div class="foot-links">
        <button onclick="goTo('home')">Home</button>
        <button onclick="goTo('services')">Services</button>
        <button onclick="goTo('gallery')">Gallery</button>
        <button onclick="goTo('about')">About</button>
        <button onclick="goTo('contact')">Contact</button>
      </div>
      <div>D&amp;T Style — Vientiane, Laos</div>
      <button class="admin-link" onclick="goTo('admin')">Owner login</button>
    </footer>
    ${renderCartDrawer()}
  `;
  if(route==='home'){ ensureHeroVideo(); }
  renderCheckoutQR();
}

loadData();
</script>
</body>
</html>
